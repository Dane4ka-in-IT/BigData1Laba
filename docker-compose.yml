services:
  postgres_dwh:
    image: postgres:15-alpine
    container_name: petstore_dwh_db
    environment:
      POSTGRES_USER: dw_admin
      POSTGRES_PASSWORD: dw_password
      POSTGRES_DB: snowflake_db
    ports:
      - "5432:5432"
    volumes:
      - ./исходные данные:/data_csv
      - ./db_init:/docker-entrypoint-initdb.d